services:
    database:
        image: mariadb
        container_name: slidequiz-database
        restart: always
        environment:
            MARIADB_DATABASE: ${MARIADB_DATABASE}
            MARIADB_USER: ${MARIADB_USER}
            MARIADB_PASSWORD: ${MARIADB_PASSWORD}
            MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
        volumes:
            - ./volume/mariadb:/var/lib/mysql:Z
            - ./config/SlideQuiz.sql:/docker-entrypoint-initdb.d/SlideQuiz.sql:ro
        healthcheck:
            test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p${MARIADB_ROOT_PASSWORD}"]
            timeout: 20s
            interval: 5s
            retries: 10

    cache:
        image: redis
        container_name: slidequiz-cache
        restart: always
        command: ["redis-server", "--appendonly", "yes"]
        volumes:
            - ./volume/redis:/data:Z
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            timeout: 20s
            interval: 5s
            retries: 5

    server:
        build:
            context: ../server
            dockerfile: Dockerfile
        container_name: slidequiz-server
        restart: always
        environment:
            HOST: ${SERVER_HOST:-0.0.0.0}
            PORT: ${SERVER_PORT:-3000}
            DSN: ${SERVER_DSN}
            CACHE: ${SERVER_CACHE}
            CORS_ALLOW: ${SERVER_CORS_ALLOW}
            JWT_SECRET: ${SERVER_JWT_SECRET}
            JWT_EXPIRES: ${SERVER_JWT_EXPIRES}
            HASH_AMOUNT: ${SERVER_HASH_AMOUNT}
            ENABLE_LOGIN: ${SERVER_ENABLE_LOGIN}
            ENABLE_REGISTER: ${SERVER_ENABLE_REGISTER}
            PAGINATION: ${SERVER_PAGINATION}
            CODE_LENGTH: ${SERVER_CODE_LENGTH}
        ports:
            - "${SERVER_PORT:-3000}:${SERVER_PORT:-3000}"
        depends_on:
            database:
                condition: service_healthy
            cache:
                condition: service_healthy

    client:
        build:
            context: ../client
            dockerfile: Dockerfile
            args:
                VITE_BASE_URL: ${CLIENT_API}
        container_name: slidequiz-client
        restart: always
        environment:
            VITE_BASE_URL: ${CLIENT_API}
        ports:
            - "${CLIENT_PORT:-3001}:80"

networks:
    default:
        name: slidequiz
